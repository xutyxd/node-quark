name: Build Multi-Arch Node Scratch Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly rebuilds for security updates
  workflow_dispatch:

permissions:
  id-token: write # For signing
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/node-quark

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        alpine: ["3.20", "3.22", "edge"]
        include:
          - alpine: "3.20"
            platform-name: alpine3.20
          - alpine: "3.22"
            platform-name: alpine3.22
          - alpine: "edge"
            platform-name: edge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build AMD64 only first to extract Node version
      - name: Build AMD64 for version extraction
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true  # Load into local Docker for inspection
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine }}
          tags: ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }}
          cache-from: type=gha,scope=${{ matrix.alpine }}
          cache-to: type=gha,scope=${{ matrix.alpine }},mode=max
      # Smoke test to check all is OK
      - name: Test image functionality
        run: |
          # Test basic Node.js functionality
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "console.log('Basic test: OK')"
          
          # Test crypto (often fails in minimal images)
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "console.log('Crypto test:', require('crypto').randomBytes(4).toString('hex'))"
          
          # Test HTTPS (CA certs)
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "require('https').get('https://google.com', (r) => console.log('HTTPS test:', r.statusCode))"
      # Extract Node.js version from built image
      - name: Extract Node version
        id: node_version
        run: |
          FULL_VER=$(docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} --version | tr -d 'v')
          echo "full=$FULL_VER" >> $GITHUB_OUTPUT
          
          # Parse components
          MAJOR=$(echo "$FULL_VER" | cut -d. -f1 | cut -d- -f1)
          MINOR=$(echo "$FULL_VER" | cut -d. -f2)
          PATCH=$(echo "$FULL_VER" | cut -d. -f3 | cut -d- -f1)
          
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          
          echo "Detected Node.js v$FULL_VER"

      # Generate tags
      - name: Generate tags
        id: meta
        run: |
          VERSION="${{ steps.node_version.outputs.full }}"
          MAJOR="${{ steps.node_version.outputs.major }}"
          MINOR="${{ steps.node_version.outputs.minor }}"
          PATCH="${{ steps.node_version.outputs.patch }}"
          ALPINE="${{ matrix.alpine }}"
          
          TAGS=""
          if [ "$ALPINE" = "edge" ]; then
            # Edge tagging: edge, 23-edge (or whatever major)
            TAGS="${{ env.IMAGE_NAME }}:edge,${{ env.IMAGE_NAME }}:${MAJOR}-edge"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${MAJOR}"
          else
            # Standard tagging: 20, 20.15, 20.15.1, 20.15.1-alpine3.20
            TAGS="${{ env.IMAGE_NAME }}:${MAJOR}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${MAJOR}.${MINOR}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${MAJOR}.${MINOR}.${PATCH}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${MAJOR}.${MINOR}.${PATCH}-alpine${ALPINE}"
            
            # Optional: latest tag for highest Alpine (3.21 currently)
            if [ "$ALPINE" = "3.22" ]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
            fi
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Tags: $TAGS"

      # Build and push multi-arch
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine }}
            NODE_VERSION=${{ steps.node_version.outputs.full }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.alpine }}
          # Don't cache-to here to avoid overwriting single-arch cache if needed
          provenance: false  # Reduces manifest complexity for scratch images
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ steps.node_version.outputs.major }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3
        env:
          COSIGN_YES: "true"  # Auto-approve the prompt
        run: |
          cosign attest \
            --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}@${{ steps.build.outputs.digest }}

      # Cleanup temp image
      - name: Cleanup temp image
        run: docker rmi ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} || true