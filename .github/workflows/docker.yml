name: Build Multi-Arch Node Scratch Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly rebuilds for security updates
  workflow_dispatch:

permissions:
  id-token: write # For signing
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/node-quark

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        alpine: ["3.20", "3.22", "edge"]
        include:
          - alpine: "3.20"
            platform-name: alpine3.20
          - alpine: "3.22"
            platform-name: alpine3.22
          - alpine: "edge"
            platform-name: edge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build AMD64 only first to extract Node version
      - name: Build AMD64 for version extraction
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true  # Load into local Docker for inspection
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine }}
          tags: ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }}
          cache-from: type=gha,scope=${{ matrix.alpine }}
          cache-to: type=gha,scope=${{ matrix.alpine }},mode=max
      # Smoke test to check all is OK
      - name: Test image functionality
        run: |
          # Test basic Node.js functionality
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "console.log('Basic test: OK')"
          
          # Test crypto (often fails in minimal images)
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "console.log('Crypto test:', require('crypto').randomBytes(4).toString('hex'))"
          
          # Test HTTPS (CA certs)
          docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} \
            -e "require('https').get('https://google.com', (r) => console.log('HTTPS test:', r.statusCode))"
      # Extract Node.js version from built image
      - name: Extract Node version
        id: node_version
        run: |
          FULL_VER=$(docker run --rm ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} --version | tr -d 'v')
          echo "full=$FULL_VER" >> $GITHUB_OUTPUT
          echo "major=$(cut -d. -f1 <<< $FULL_VER)" >> $GITHUB_OUTPUT
          echo "minor=$(cut -d. -f2 <<< $FULL_VER)" >> $GITHUB_OUTPUT
          echo "patch=$(cut -d. -f3 <<< $FULL_VER)" >> $GITHUB_OUTPUT

      # Generate tags
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false  # We control latest manually
          tags: |
            type=raw,value=${{ steps.node_version.outputs.major }},enable=${{ matrix.alpine != 'edge' }}
            type=raw,value=${{ steps.node_version.outputs.major }}.${{ steps.node_version.outputs.minor }},enable=${{ matrix.alpine != 'edge' }}
            type=raw,value=${{ steps.node_version.outputs.major }}.${{ steps.node_version.outputs.minor }}.${{ steps.node_version.outputs.patch }},enable=${{ matrix.alpine != 'edge' }}
            type=raw,value=${{ steps.node_version.outputs.major }}.${{ steps.node_version.outputs.minor }}.${{ steps.node_version.outputs.patch }}-alpine${{ matrix.alpine }},enable=${{ matrix.alpine != 'edge' }}
            type=raw,value=edge,enable=${{ matrix.alpine == 'edge' }}
            type=raw,value=${{ steps.node_version.outputs.major }}-edge,enable=${{ matrix.alpine == 'edge' }}
            type=raw,value=latest,enable=${{ matrix.alpine == '3.22' }}

      # Build and push multi-arch
      - name: Build and push multi-arch
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine }}
            NODE_VERSION=${{ steps.node_version.outputs.full }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.alpine }}
          # Don't cache-to here to avoid overwriting single-arch cache if needed
          provenance: false  # Reduces manifest complexity for scratch images
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ steps.node_version.outputs.major }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest image with cosign
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest \
            --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      # Cleanup temp image
      - name: Cleanup temp image
        run: docker rmi ${{ env.IMAGE_NAME }}:temp-extract-${{ matrix.alpine }} || true